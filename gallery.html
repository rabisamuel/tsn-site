        <h2 class="section-title">Gallery</h2>
        <p style="text-align: center; color: var(--text-muted); max-width: 600px; margin: 0 auto 3rem;">From the world of The Sixteenth Night. The cover, the temple under the full moon, and the research behind the novel.</p>

        <div class="gallery-grid">
          <!-- 1. Front cover -->
          <figure class="gallery-item">
            <img src="images/cover.jpg"
                 alt="The Sixteenth Night front cover"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/cover-1000.jpg"
                 data-caption="The Sixteenth Night — front cover">
            <figcaption class="gallery-intro">Front cover</figcaption>
          </figure>

          <!-- 2. Full wrap -->
          <figure class="gallery-item">
            <img src="images/full-cover.jpg"
                 alt="The Sixteenth Night full cover wrap"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/full-cover.jpg"
                 data-caption="The Sixteenth Night — full cover wrap">
            <figcaption class="gallery-intro">Full cover wrap</figcaption>
          </figure>

          <!-- 3. Back cover -->
          <figure class="gallery-item">
            <img src="images/back-cover.jpg"
                 alt="The Sixteenth Night back cover"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/back-cover.jpg"
                 data-caption="The Sixteenth Night — back cover">
            <figcaption class="gallery-intro">Back cover</figcaption>
          </figure>

          <!-- 4. Map -->
          <figure class="gallery-item">
            <img src="images/cauvery-delta-map.jpg"
                 alt="Illustrated map of the Cauvery Delta showing Kumbakonam and the temple towns"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/cauvery-delta-map.jpg"
                 data-caption="The Cauvery Delta — Kumbakonam and the temple towns of the novel">
            <figcaption class="gallery-intro">The Cauvery Delta — Kumbakonam and the temple towns of the novel</figcaption>
          </figure>

          <!-- 5. Naadi leaves -->
          <figure class="gallery-item">
            <img src="images/naadi-leaf.jpg"
                 alt="Illustration of a bundle of palm-leaf manuscripts bound with cord"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/naadi-leaf.jpg"
                 data-caption="A palm-leaf bundle — an illustration of the records at the heart of the novel">
            <figcaption class="gallery-intro">A palm-leaf bundle — an illustration of the records at the heart of the novel</figcaption>
          </figure>

          <!-- 6. Naadi reading -->
          <figure class="gallery-item">
            <img src="images/naadi-reading.jpg"
                 alt="Illustration of a Naadi reader with palm leaves and a voice recorder on the table"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/naadi-reading.jpg"
                 data-caption="The reading — leaves, a recorder, and the gods watching from the walls">
            <figcaption class="gallery-intro">The reading — leaves, a recorder, and the gods watching from the walls</figcaption>
          </figure>

          <!-- 7. Suryanar Koil -->
          <figure class="gallery-item">
            <img src="images/suryanar-koil.jpg"
                 alt="Illustration of Suryanar Koil, the Sun temple"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/suryanar-koil.jpg"
                 data-caption="Suryanar Koil — the Sun temple, where the novel ends">
            <figcaption class="gallery-intro">Suryanar Koil — the Sun temple</figcaption>
          </figure>

          <!-- 8. Adi Kumbeswarar -->
          <figure class="gallery-item">
            <img src="images/adi-kumbeswarar.jpg"
                 alt="Illustration of Adi Kumbeswarar Temple, Kumbakonam, with its tank in the foreground"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/adi-kumbeswarar.jpg"
                 data-caption="Adi Kumbeswarar Temple, Kumbakonam">
            <figcaption class="gallery-intro">Adi Kumbeswarar Temple, Kumbakonam</figcaption>
          </figure>

          <!-- 9. Kalimedu ther -->
          <figure class="gallery-item">
            <img src="images/kalimedu-ther.jpg"
                 alt="Illustration of a temple chariot being pulled through the streets during a festival"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/kalimedu-ther.jpg"
                 data-caption="The ther — a temple chariot on festival day">
            <figcaption class="gallery-intro">The ther — a temple chariot on festival day</figcaption>
          </figure>

          <!-- 10. River bungalow -->
          <figure class="gallery-item">
            <img src="images/river-bungalow.jpg"
                 alt="Illustration of a tiled bungalow beside the river with temple towers across the water"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/river-bungalow.jpg"
                 data-caption="The bungalow by the river">
            <figcaption class="gallery-intro">The bungalow by the river</figcaption>
          </figure>

          <!-- 11. Tent kottai -->
          <figure class="gallery-item">
            <img src="images/tent-kottai.jpg"
                 alt="Illustration of a tent kottai, a traveling tent cinema, screening a Tamil film song"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/tent-kottai.jpg"
                 data-caption="The tent kottai — the traveling tent cinema of the Tamil countryside">
            <figcaption class="gallery-intro">The tent kottai — the traveling tent cinema of the Tamil countryside</figcaption>
          </figure>

          <figure class="gallery-item">
            <img src="images/filter-coffee.jpg"
                 alt="Illustration of a South Indian filter coffee set, assembled, brewing, and in parts"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/filter-coffee.jpg"
                 data-caption="Degree coffee — the Kumbakonam filter, assembled and in parts">
            <figcaption class="gallery-intro">Degree coffee — the Kumbakonam filter, assembled and in parts</figcaption>
          </figure>

          <!-- 13. Vijay at work -->
          <figure class="gallery-item">
            <img src="images/vijay-desk.jpg"
                 alt="Illustration of a data scientist at his desk before a screen of network diagrams"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/vijay-desk.jpg"
                 data-caption="Vijay — San Jose, where the engine was built">
            <figcaption class="gallery-intro">Vijay — San Jose, where the engine was built</figcaption>
          </figure>

          <!-- 14. Activa -->
          <figure class="gallery-item">
            <img src="images/activa.jpg"
                 alt="Illustration of Vijay and Meera on a scooter before a temple gateway"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/activa.jpg"
                 data-caption="Vijay and Meera — on the Activa, outside the temple">
            <figcaption class="gallery-intro">Vijay and Meera — on the Activa</figcaption>
          </figure>

          <!-- 15. Temple visit -->
          <figure class="gallery-item">
            <img src="images/temple-visit.jpg"
                 alt="Illustration of Vijay and Meera walking out of a temple past rows of oil lamps"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/temple-visit.jpg"
                 data-caption="Vijay and Meera — leaving the temple, past the lamps">
            <figcaption class="gallery-intro">Vijay and Meera — leaving the temple</figcaption>
          </figure>

          <!-- 16. Leaves and the engine -->
          <figure class="gallery-item">
            <img src="images/leaves-and-engine.jpg"

                 data-caption="The leaves and the engine — two ways of writing a life">
            <figcaption class="gallery-intro">The leaves and the engine — two ways of writing a life</figcaption>
