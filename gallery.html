    <nav class="nav" aria-label="Primary">

  <main>
    <section class="section" style="padding-top: 5rem;">
      <div class="container">
        <h2 class="section-title">Gallery</h2>
        <p style="text-align: center; color: var(--text-muted); max-width: 600px; margin: 0 auto 3rem;">From the world of The Sixteenth Night. The cover, the temple under the full moon, and the research behind the novel.</p>

        <div class="gallery-grid">
          <!-- 1. Front cover -->
          <figure class="gallery-item">
            <img src="images/cover.jpg"
                 alt="The Sixteenth Night front cover"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/cover-1000.jpg"
                 data-caption="The Sixteenth Night — front cover">
            <figcaption class="gallery-intro">Front cover</figcaption>
          </figure>

          <!-- 2. Full wrap -->
          <figure class="gallery-item">
            <img src="images/full-cover.jpg"
                 alt="The Sixteenth Night full cover wrap"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/full-cover.jpg"
                 data-caption="The Sixteenth Night — full cover wrap">
            <figcaption class="gallery-intro">Full cover wrap</figcaption>
          </figure>

          <!-- 3. Back cover -->
          <figure class="gallery-item">
            <img src="images/back-cover.jpg"
                 alt="The Sixteenth Night back cover"
                 loading="lazy"
                 class="gallery-img"
                 data-full="images/back-cover.jpg"
                 data-caption="The Sixteenth Night — back cover">
            <figcaption class="gallery-intro">Back cover</figcaption>
          </figure>

          <!-- PLACEHOLDER: add research and location photos here as they become
